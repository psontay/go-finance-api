# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: ci-test

on:
  push:
    branches: [ "master", "feature/**" ]
  pull_request:
    branches: [ "master" ]

jobs:

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: elvis
          POSTGRES_PASSWORD: elvis
          POSTGRES_DB: simple_bank
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DB_DRIVER=postgres" > .env
          echo "DB_SOURCE=postgresql://elvis:elvis@localhost:5432/simple_bank?sslmode=disable" >> .env
          echo "SERVER_ADDRESS=0.0.0.0:8080" >> .env
          echo "TOKEN_SYMMETRIC_KEY=12345678901234567890123456789012" >> .env
          echo "ACCESS_TOKEN_DURATION=15m" >> .env

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
          cache: true

      - name: Cache golang-migrate
        id: cache-migrate
        uses: actions/cache@v3
        with:
          path: ~/migrate_bin
          key: ${{ runner.os }}-migrate-v4.15.2

      - name: Install golang-migrate
        if: steps.cache-migrate.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/migrate_bin
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.15.2/migrate.linux-amd64.tar.gz | tar xvz -C ~/migrate_bin

      - name: Add migrate to PATH
        run: |
          sudo cp ~/migrate_bin/migrate /usr/bin/migrate
          which migrate

      - name: Run migrations
        run: make migrateup

      - name: Test
        run: make test